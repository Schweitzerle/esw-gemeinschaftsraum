name: CI

on:
  push:
  pull_request:

env:
  HAUS_PASSWORT: ci-test-passwort
  SESSION_SECRET: ci-secret-0123456789abcdef0123456789abcdef0123456789
  DATABASE_PATH: data/ci.db

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run test:unit -- --run
      - run: npm run build
